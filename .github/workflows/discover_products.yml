# CollectLocal — TCG Product Auto-Discovery
# Runs weekly to find new TCG products at Target + Walmart
# Also runs on-demand via workflow_dispatch

name: Discover New TCG Products

on:
  # Every Monday at 6 AM UTC (midnight CST)
  schedule:
    - cron: '0 6 * * 1'

  # Manual trigger
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover products
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python discover_products.py
