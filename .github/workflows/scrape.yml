# CollectLocal — Automated Scraper Pipeline
# Runs on GitHub Actions FREE tier (2,000 min/month for private repos)
# Scrapes FB Marketplace → enriches with TCG API → pushes to Supabase

name: Scrape Marketplace

on:
  # Run every 6 hours (4x/day to stay within free tier budgets)
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HOME_LAT: ${{ secrets.HOME_LAT }}
          HOME_LNG: ${{ secrets.HOME_LNG }}
          SEARCH_LOCATION: ${{ secrets.SEARCH_LOCATION }}
          SEARCH_RADIUS_MILES: ${{ secrets.SEARCH_RADIUS_MILES }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python scraper.py
